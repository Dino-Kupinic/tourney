services:
  viewer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: viewer
        APP_PORT: 3001
    env_file:
      - ./apps/viewer/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: admin
        APP_PORT: 3000
    env_file:
      - ./apps/admin/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      NUXT_PUBLIC_CLIENT_URL: ${NUXT_PUBLIC_CLIENT_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - viewer
    restart: unless-stopped
